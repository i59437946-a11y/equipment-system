<script>
  // 攔截原本的表單送出動作
  const form = document.querySelector('form');
  const submitBtn = document.querySelector('button[type="submit"]');

  form.addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止傳統網頁跳轉
    
    // 改變按鈕狀態，讓使用者知道正在處理
    submitBtn.textContent = '上傳與建檔中，請稍候...';
    submitBtn.disabled = true;
    submitBtn.style.backgroundColor = '#6c757d'; // 變灰色

    // 取得圖片檔案
    const fileInput = document.querySelector('input[type="file"]');
    const file = fileInput.files[0];
    
    // 將圖片讀取為 Base64
    const reader = new FileReader();
    reader.onload = function(event) {
      const base64Data = event.target.result;
      
      // 收集所有填寫的資料
      const payload = {
        submitted_by: document.querySelector('[name="submitted_by"]').value,
        vehicle_name: document.querySelector('[name="vehicle_name"]').value,
        placement_area: document.querySelector('[name="placement_area"]').value,
        placement_detail: document.querySelector('[name="placement_detail"]').value,
        equipment_name: document.querySelector('[name="equipment_name"]').value,
        quantity: document.querySelector('[name="quantity"]').value,
        remarks: document.querySelector('[name="remarks"]').value,
        // 照片資料
        imageFile: base64Data,
        imageName: file.name,
        imageMime: file.type
      };

      // ⚠️ 請將下方的 URL 替換成你剛剛在 GAS 拿到的「網頁應用程式網址」
      const GAS_URL = '你的_GAS_網頁應用程式網址_貼在這裡';

      // 傳送給 Google
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        if (result.status === 'success') {
          alert('✅ 裝備建檔成功！');
          form.reset(); // 清空表單，方便建檔下一個
        } else {
          alert('❌ 建檔失敗：' + result.message);
        }
      })
      .catch(error => {
        alert('❌ 網路連線錯誤，請重試！');
      })
      .finally(() => {
        // 恢復按鈕狀態
        submitBtn.textContent = '確認建檔';
        submitBtn.disabled = false;
        submitBtn.style.backgroundColor = '#007bff';
      });
    };
    
    // 執行讀取
    if (file) {
      reader.readAsDataURL(file);
    } else {
      alert("請選擇照片！");
    }
  });
</script>
